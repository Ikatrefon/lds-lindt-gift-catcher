server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HTML zawsze świeży (obie wersje) — przeglądarka rewaliduje, brak utknięcia na starej wersji
    location ~ ^/(index|nomusic)\.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
